server:
  servlet:
    context-path: /api

spring:
  application:
    name: ciolaflix-be # Application name
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ciolaflix} # Primary database URL
    username: ${DB_USERNAME} # Database username
    password: ${DB_PASSWORD} # Database password
    driver-class-name: org.postgresql.Driver # MariaDB JDBC driver

blackout:
  base-url: # Base URL for all blackout API endpoints []. It is recommended to take a look at base url configuration in the docs.

  # !!REQUIRED!! Config to access and configure primary datasource
  parent:
    datasource:
      repository: xyz.fdt.ciolaflixbe.repo # JPA repositories package
      model: xyz.fdt.ciolaflixbe.model # JPA models package
      jpaProperties:
        hibernate.hbm2ddl.auto: validate # Hibernate DDL mode [update]
        hibernate.format_sql: true # Format SQL queries [true]
        hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect # PostgreSQL dialect

  # !!REQUIRED!! JWT configuration
  jwt:
    access-token-exp: ${JWT_ACCESS_TOKEN_EXP:2592000000} # Expiration time for the access token (15 min) [900000 (15 min)]
    refresh-token-exp-no-remember: ${JWT_REFRESH_TOKEN_EXP_NO_REMEMBER:3600000} # Refresh token expiration when "remember me" is false (1 hour) [3600000 (1 hour)]
    refresh-token-exp: ${JWT_REFRESH_TOKEN_EXP:2592000000} # Refresh token expiration when "remember me" is true (30 days) [2592000000 (30 days)]
    secret: ${JWT_SECRET} # JWT secret key (should be base64-encoded in production)

  # CORS configuration
  cors:
    allow-credentials: false # Allow credentials (cookies) in CORS requests [false]
    allowed-headers: # Allowed headers in CORS requests [*]
      - "*"
    allowed-methods: # Allowed HTTP methods in CORS requests [*]
      - "*"
    allowed-origins: # Allowed origins for CORS (use specific domains in production) [*]
      - "https://ciolaflix2-0.vercel.app/"
      - "https://ciolaflix.francesco2003-fdt.workers.dev"
      - "https://ciolaflix.vercel.app"
      - "http://localhost:5173"

  # Security filter chain rules
  filterchain:
    allowed:
      - /ciola/signup
      - /ws

  # OpenAPI/Swagger configuration
  openapi:
    paths-to-match: # !!REQUIRED!! Paths to include in OpenAPI documentation
      - "/**"

tmdb:
  api-url: ${TMDB_API_URL:https://api.themoviedb.org/3}
  api-key: ${TMDB_API_KEY}

